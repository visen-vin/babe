<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaspbot Command Center</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-primary: #00f2fe;
            --accent-secondary: #4facfe;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --text-muted: #808080;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 40px;
            text-align: center;
            background: linear-gradient(180deg, rgba(0, 242, 254, 0.05) 0%, transparent 100%);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.2);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            margin-top: 0;
            color: var(--accent-primary);
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
            color: #fff;
        }

        .metric-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .chart-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-top: 20px;
            height: 400px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(0, 255, 127, 0.1);
            color: #00ff7f;
            border: 1px solid rgba(0, 255, 127, 0.2);
        }

        .pulsing-dot {
            width: 8px;
            height: 8px;
            background: #00ff7f;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff7f;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.7;
            }
        }

        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>VASPBOT COMMAND CENTER</h1>
        <div style="margin-top: 15px;">
            <span class="status-badge">
                <div class="pulsing-dot"></div> SYSTEM ONLINE
            </span>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>Total Cost (24h)</h2>
                <div class="metric-value" id="total-cost">$0.00</div>
                <div class="metric-label">Estimated LLM Spending</div>
            </div>
            <div class="card">
                <h2>Server Health</h2>
                <div class="metric-value" id="cpu-load">0.00</div>
                <div class="metric-label">CPU Load Average (1m)</div>
            </div>
            <div class="card">
                <h2>RAM Usage</h2>
                <div class="metric-value" id="ram-usage">0%</div>
                <div class="metric-label" id="ram-details">0 GB / 0 GB</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="costChart"></canvas>
        </div>
    </div>

    <footer>
        &copy; 2026 VASPBOT ARCHITECT | DESIGNED FOR VINAYAK SINGH JI
    </footer>

    <script>
        let costChart;

        async function updateMetrics() {
            try {
                const response = await fetch('/metrics');
                const data = await response.json();

                // Update Overview Metrics
                const totalCost = data.usage.reduce((sum, r) => sum + r.cost, 0);
                document.getElementById('total-cost').innerText = `$${totalCost.toFixed(4)}`;
                document.getElementById('cpu-load').innerText = data.server.cpuLoad;
                document.getElementById('ram-usage').innerText = data.server.memory.percent;
                document.getElementById('ram-details').innerText = `${data.server.memory.used} / ${data.server.memory.total}`;

                // Process Chart Data
                const labels = data.usage.slice(-20).map(r => new Date(r.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                const costs = data.usage.slice(-20).map(r => r.cost);

                if (costChart) {
                    costChart.data.labels = labels;
                    costChart.data.datasets[0].data = costs;
                    costChart.update();
                } else {
                    initChart(labels, costs);
                }

            } catch (e) {
                console.error("Failed to fetch metrics", e);
            }
        }

        function initChart(labels, data) {
            const ctx = document.getElementById('costChart').getContext('2d');
            costChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Cost per Request ($)',
                        data: data,
                        borderColor: '#00f2fe',
                        backgroundColor: 'rgba(0, 242, 254, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#808080' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#808080' }
                        }
                    }
                }
            });
        }

        setInterval(updateMetrics, 5000);
        updateMetrics();
    </script>
</body>

</html>
